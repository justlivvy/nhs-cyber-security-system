<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NHS Staff Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<main class="container">
<div class="logo">NHS</div>
<h1>Secure Staff Dashboard</h1>
<p id="welcome">Checking login...</p>

<button class="blue" onclick="window.location='popup.html?action=register'">Register Biometric</button>
<button class="green" onclick="window.location='popup.html?action=login'">Biometric Login</button>
<button class="secondary" id="logoutButton">Log Out</button>

<nav class="links" aria-label="Demo pages">
<a href="database.html">Login database</a>
<a href="server.html">Server logs</a>
<a href="sqlmap.html">Legacy breach</a>
</nav>
</main>

<script>
const welcome = document.getElementById("welcome");
const saved = localStorage.getItem("nhsUser");

if (!saved) {
  welcome.textContent = "No staff login found. Please log in first.";
} else {
  const user = JSON.parse(saved);
  welcome.textContent = `${user.fullName} signed in as ${user.role}`;
}

document.getElementById("logoutButton").addEventListener("click", () => {
  localStorage.removeItem("nhsUser");
  window.location = "index.html";
});
</script>
</body>
</html>
