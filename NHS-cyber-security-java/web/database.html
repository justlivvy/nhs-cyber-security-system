<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Database</title>
<link rel="stylesheet" href="style.css">
</head>
<body class="blackscreen">
<main class="card">
<h1>Login Database</h1>
<p id="databasePath">&gt; Loading database path...</p>
<table>
<thead>
<tr>
<th>Username</th>
<th>Name</th>
<th>Role</th>
<th>Password Hash</th>
<th>Biometric ID</th>
<th>Last Login</th>
</tr>
</thead>
<tbody id="users">
<tr><td colspan="6">Loading login records...</td></tr>
</tbody>
</table>
<p id="note" class="greenText"></p>
<nav class="links dark-links" aria-label="Demo pages">
<a href="index.html">Home</a>
<a href="register.html">Create login</a>
<a href="dashboard.html">Dashboard</a>
<a href="server.html">Server logs</a>
<a href="sqlmap.html">Legacy breach</a>
</nav>
</main>

<script>
async function loadDatabase() {
  const rows = document.getElementById("users");
  const note = document.getElementById("note");
  const databasePath = document.getElementById("databasePath");
  try {
    const response = await fetch("/api/database");
    const data = await response.json();
    databasePath.textContent = `> ${data.database}`;
    rows.innerHTML = data.users.map(item => `
      <tr>
        <td>${item.username}</td>
        <td>${item.fullName}</td>
        <td>${item.role}</td>
        <td>${item.passwordHash}</td>
        <td>${item.credentialID}</td>
        <td>${item.lastLogin}</td>
      </tr>
    `).join("");
    note.textContent = data.note;
  } catch (error) {
    rows.innerHTML = "<tr><td colspan=\"6\">Could not reach Java database endpoint.</td></tr>";
  }
}

loadDatabase();
</script>
</body>
</html>
