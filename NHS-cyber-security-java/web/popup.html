<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Windows Security</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<main class="container">
<h1>Windows Security</h1>
<p id="modeText">Making sure it is you</p>
<div class="fingerprint" aria-hidden="true">ID</div>
<p id="userText">Linked to staff login</p>

<button class="green" id="scanButton">Scan Fingerprint</button>
<p id="result" class="status"></p>

<nav class="links" aria-label="Demo pages">
<a href="index.html">Home</a>
<a href="dashboard.html">Dashboard</a>
<a href="server.html">Server logs</a>
<a href="database.html">Login database</a>
</nav>
</main>

<script>
const params = new URLSearchParams(window.location.search);
const action = params.get("action") === "register" ? "register" : "login";
const savedUser = JSON.parse(localStorage.getItem("nhsUser") || "{}");
const pendingUser = localStorage.getItem("nhsPendingBiometricUser");
const username = savedUser.user || pendingUser || "";
const modeText = document.getElementById("modeText");
const userText = document.getElementById("userText");
const result = document.getElementById("result");
const scanButton = document.getElementById("scanButton");

modeText.textContent = action === "register" ? "Registering staff biometric credential" : "Making sure it is you";
scanButton.textContent = action === "register" ? "Register Fingerprint" : "Scan Fingerprint";
userText.textContent = username ? `Staff account: ${username}` : "Log in first to link a staff account";

scanButton.addEventListener("click", async () => {
  scanButton.disabled = true;
  result.textContent = "Contacting Java security server...";
  result.className = "status";

  try {
    const response = await fetch("/api/biometric", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username })
    });
    const data = await response.json();

    if (!response.ok) {
      result.textContent = data.message;
      result.className = "status error";
      return;
    }

    result.textContent = `${data.message}: ${data.user}`;
    result.className = "status success";
  } catch (error) {
    result.textContent = "Could not reach the Java server.";
    result.className = "status error";
  } finally {
    scanButton.disabled = false;
  }
});
</script>
</body>
</html>
